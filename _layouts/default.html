<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'ko' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Dark mode: apply before paint to prevent FOUC -->
  <script>
    (function() {
      var saved = localStorage.getItem('theme');
      if (saved) {
        document.documentElement.setAttribute('data-theme', saved);
      } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/img/favicon.svg' | relative_url }}">
  <link rel="icon" type="image/png" href="{{ '/assets/img/favicon.png' | relative_url }}">

  <!-- Fonts (Consensus: Noto Serif KR + Pretendard + JetBrains Mono) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">

  <!-- KaTeX (math rendering) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" onload="renderMathInElement(document.body);"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

  {% if site.google_analytics %}
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', '{{ site.google_analytics }}');
  </script>
  {% endif %}

  {% feed_meta %}
  {% seo %}

  <!-- ScholarlyArticle JSON-LD for research posts -->
  {% if page.layout == 'post' %}
  {% include jsonld.html %}
  {% endif %}
</head>
<body>
  {% include header.html %}

  <main class="main-content">
    {{ content }}
  </main>

  {% include footer.html %}

  <!-- Reading Progress Bar -->
  <div id="reading-progress" style="position:fixed;top:0;left:0;height:3px;background:var(--accent);z-index:9999;transition:width 0.1s;width:0;"></div>

  <!-- Mermaid (diagrams in markdown) -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script>
    // Convert kramdown code blocks to mermaid divs before init
    document.querySelectorAll('pre code.language-mermaid').forEach(function(block) {
      var div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = block.textContent;
      block.parentElement.replaceWith(div);
    });
    mermaid.initialize({
      startOnLoad: true,
      theme: document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'default',
      securityLevel: 'loose',
      fontSize: 14,
      flowchart: { curve: 'basis', padding: 20, nodeSpacing: 50, rankSpacing: 60, htmlLabels: true },
      themeVariables: {
        fontFamily: "'Pretendard Variable', 'Noto Serif KR', sans-serif",
        fontSize: '14px',
        primaryColor: '#2F5D50',
        primaryTextColor: '#1A1A1A',
        primaryBorderColor: '#D6D0C4',
        lineColor: '#6B665C',
        secondaryColor: '#F5F3ED',
        tertiaryColor: '#EDEBE4',
        noteBkgColor: '#FAF7F2',
        noteTextColor: '#1A1A1A'
      }
    });
  </script>

  <script>
    // Dark mode toggle
    var toggle = document.getElementById('dark-mode-toggle');
    if (toggle) {
      toggle.addEventListener('click', function() {
        var current = document.documentElement.getAttribute('data-theme');
        var next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
      });
    }

    // Mobile nav toggle
    var navToggle = document.getElementById('nav-toggle');
    if (navToggle) {
      navToggle.addEventListener('click', function() {
        document.getElementById('nav-menu').classList.toggle('active');
        this.classList.toggle('active');
      });
    }

    // Reading progress bar
    window.addEventListener('scroll', function() {
      var bar = document.getElementById('reading-progress');
      if (!bar) return;
      var h = document.documentElement;
      var pct = (h.scrollTop / (h.scrollHeight - h.clientHeight)) * 100;
      bar.style.width = Math.min(pct, 100) + '%';
    });

    // Code copy button (auto-inject on code blocks, skip cite-box and mermaid)
    document.querySelectorAll('pre code').forEach(function(block) {
      if (block.closest('.cite-box') || block.classList.contains('language-mermaid')) return;
      var btn = document.createElement('button');
      btn.className = 'code-copy-btn';
      btn.textContent = 'Copy';
      btn.addEventListener('click', function() {
        navigator.clipboard.writeText(block.textContent).then(function() {
          btn.textContent = 'Copied!';
          setTimeout(function() { btn.textContent = 'Copy'; }, 2000);
        });
      });
      block.parentElement.style.position = 'relative';
      block.parentElement.appendChild(btn);
    });
  </script>
</body>
</html>
