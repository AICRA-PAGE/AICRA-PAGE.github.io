---
layout: default
---

<div class="archive-page">
  <header class="archive-header">
    <h1>{{ page.date | date: "%Y" }}</h1>
    <p class="archive-description">Articles published in {{ page.date | date: "%Y" }}</p>
  </header>

  <div class="posts-grid">
    {% for post in page.posts %}
      {% include post-card.html post=post %}
    {% endfor %}
  </div>

  {% if page.posts.size == 0 %}
  <div class="empty-state">
    <p>No articles published in this year.</p>
  </div>
  {% endif %}

  <nav class="archive-nav">
    <a href="{{ '/blog/' | relative_url }}" class="back-link">&larr; All Articles</a>
  </nav>
</div>
