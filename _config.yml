# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------

title: AICRA
first_name: AI
last_name: Security Research Association
email: contact@aicra.org
description: >
  AICRA - AI 보안의 최전선을 연구하고, 안전한 AI 생태계를 구축합니다.

footer_text: >
  Powered by Jekyll with al-folio theme.

keywords: AI security, LLM security, OWASP, prompt injection, MCP security, agentic AI
lang: ko
icon:
logo: /assets/img/logo.svg

url: https://aicra-page.github.io
baseurl: ""
last_updated: true

# -----------------------------------------------------------------------------
# Hero Section
# -----------------------------------------------------------------------------

hero_title: "인공지능보안연구회"
hero_subtitle: "AI 보안의 최전선을 연구하고, 안전한 AI 생태계를 구축합니다."
hero_cta: "연구 살펴보기"
hero_cta_url: /blog/

# -----------------------------------------------------------------------------
# Navigation
# -----------------------------------------------------------------------------

nav_links:
  - name: Home
    url: /
  - name: Blog
    url: /blog/
  - name: Publications
    url: /publications/
  - name: Team
    url: /team/
  - name: About
    url: /about/

# -----------------------------------------------------------------------------
# Theme
# -----------------------------------------------------------------------------

repo_theme_light: default
repo_theme_dark: dark

# -----------------------------------------------------------------------------
# Layout
# -----------------------------------------------------------------------------

navbar_fixed: true
footer_fixed: false
search_enabled: true
max_width: 800px

# -----------------------------------------------------------------------------
# Open Graph
# -----------------------------------------------------------------------------

serve_og_meta: true
serve_schema_org: true

# -----------------------------------------------------------------------------
# Social
# -----------------------------------------------------------------------------

github_username: AICRA-PAGE
github_repo: AICRA-analyze

# -----------------------------------------------------------------------------
# Blog
# -----------------------------------------------------------------------------

blog_name: AICRA Research Blog
blog_nav_title: Blog
blog_description: AI Security Research and Analysis

# Timezone & Future posts
timezone: Asia/Seoul
future: true

pagination:
  enabled: true
  per_page: 9
  permalink: "/blog/page/:num/"
  sort_field: "date"
  sort_reverse: true

related_blog_posts:
  enabled: true
  max_related: 5

# -----------------------------------------------------------------------------
# Collections
# -----------------------------------------------------------------------------

collections:
  news:
    defaults:
      layout: post
    output: true
    permalink: /news/:path/

announcements:
  enabled: true
  scrollable: true
  limit: 5

# -----------------------------------------------------------------------------
# Jekyll settings
# -----------------------------------------------------------------------------

markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:title/

include: ['_pages']
exclude:
  - bin/
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - vendor
  - scripts/
  - _crosspost/

plugins:
  - jekyll-feed
  - jekyll-paginate-v2
  - jekyll-sitemap
  - jekyll-toc
  - jekyll-seo-tag
  - jemoji
  - jekyll-archives

# -----------------------------------------------------------------------------
# Sass/SCSS
# -----------------------------------------------------------------------------

sass:
  sass_dir: _sass
  style: compressed

# -----------------------------------------------------------------------------
# Jekyll Archives
# -----------------------------------------------------------------------------

jekyll-archives:
  enabled: [year, tags, categories]
  layouts:
    year: archive-year
    tag: archive-tag
    category: archive-category
  permalinks:
    year: '/blog/:year/'
    tag: '/blog/tag/:name/'
    category: '/blog/category/:name/'

display_tags: ['AI Security', 'LLM', 'OWASP', 'MCP', 'Prompt Injection', 'Agentic AI']
display_categories: ['Research', 'Analysis', 'Tutorial', 'News']
