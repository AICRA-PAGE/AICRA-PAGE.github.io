name: Weekly Research Collector

on:
  schedule:
    - cron: '0 21 * * 0'  # Monday 06:00 KST
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: research-collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run collector
        run: node scripts/collect-research.js

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: bot/research-collector
          title: "chore: weekly dataset and paper collection"
          commit-message: "chore: auto-collect datasets and papers"
          body: |
            ## Weekly Automated Collection

            Updated:
            - `assets/data/datasets.json` (new datasets)
            - `assets/data/papers.json` (new papers)

            Review focus:
            - Relevance to AI security
            - False positives
            - Duplicate entries

            Generated by [collect-research.js](scripts/collect-research.js)
          labels: automation,research-data
