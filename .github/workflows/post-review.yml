name: Post Change Review

on:
  pull_request:
    paths:
      - '_posts/**'
    types: [opened, synchronize]

jobs:
  check-author:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check post author permission
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            const prAuthor = context.payload.pull_request.user.login.toLowerCase();
            let warnings = [];

            for (const file of files) {
              if (!file.filename.startsWith('_posts/')) continue;
              if (file.status === 'added') continue;

              try {
                const content = Buffer.from(
                  (await github.rest.repos.getContent({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    path: file.filename,
                    ref: context.payload.pull_request.base.sha
                  })).data.content, 'base64'
                ).toString();

                const collabMatch = content.match(/^collaborative:\s*(true)/m);
                if (collabMatch) continue;

                const authorsMatch = content.match(/^authors:\s*\[(.+?)\]/m);
                const authorMatch = content.match(/^author:\s*["']?(.+?)["']?\s*$/m);

                let authorList = [];
                if (authorsMatch) {
                  authorList = authorsMatch[1].split(',').map(a => a.trim().replace(/["']/g, '').toLowerCase());
                } else if (authorMatch) {
                  const a = authorMatch[1].trim().toLowerCase();
                  if (a === 'aicra') continue;
                  authorList = [a];
                }

                if (authorList.length > 0 && !authorList.includes(prAuthor)) {
                  warnings.push(`\`${file.filename}\`: author(s)=${authorList.join(', ')}, PR by @${prAuthor}`);
                }
              } catch(e) { /* new file or error */ }
            }

            if (warnings.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `### Post Author Permission Check\n\n**These posts require original author approval:**\n\n${warnings.map(w => '- ' + w).join('\n')}\n\n> Original author must approve this PR.\n> Or add \`collaborative: true\` to allow shared editing.\n> Posts with \`author: AICRA\` are editable by all collaborators.`
              });
              core.setFailed('Some posts require original author approval.');
            }
