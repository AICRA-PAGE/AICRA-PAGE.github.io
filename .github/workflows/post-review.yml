name: Post Change Review

on:
  pull_request:
    paths:
      - '_posts/**'
    types: [opened, synchronize]

jobs:
  check-author:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check post author
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            const prAuthor = context.payload.pull_request.user.login;
            let warnings = [];

            for (const file of files) {
              if (!file.filename.startsWith('_posts/')) continue;
              if (file.status === 'added') continue; // new posts are OK

              // Read the file to check author field
              try {
                const content = Buffer.from(
                  (await github.rest.repos.getContent({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    path: file.filename,
                    ref: context.payload.pull_request.base.sha
                  })).data.content, 'base64'
                ).toString();

                const authorMatch = content.match(/author:\s*["']?(.+?)["']?\s*$/m);
                if (authorMatch) {
                  const postAuthor = authorMatch[1].trim();
                  if (postAuthor !== 'AICRA' && !prAuthor.toLowerCase().includes(postAuthor.toLowerCase())) {
                    warnings.push(`${file.filename}: author is "${postAuthor}", PR by @${prAuthor}`);
                  }
                }
              } catch(e) { /* new file */ }
            }

            if (warnings.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `### Post Author Check\n\nThe following posts are being modified by someone other than the original author:\n\n${warnings.map(w => '- ' + w).join('\n')}\n\nPlease get approval from the original author before merging.`
              });
            }
