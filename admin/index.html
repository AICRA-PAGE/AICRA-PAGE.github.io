<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AICRA Content Management</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', sans-serif;
      color: #1c1917; background: #f5f3ed;
      display: grid; place-items: center; padding: 24px;
    }
    .wrap { max-width: 400px; text-align: center; }
    .logo { width: 64px; height: 64px; margin-bottom: 12px; }
    h1 { font-size: 1.2rem; color: #2f5d50; margin-bottom: 4px; }
    .sub { color: #6b665c; font-size: 0.85rem; margin-bottom: 24px; }
    .info { font-size: 0.8rem; color: #6b665c; line-height: 1.6; margin-bottom: 20px; }
    .info a { color: #2f5d50; font-weight: 600; }
  </style>
</head>
<body>
  <main class="wrap">
    <img src="/assets/img/logo.svg" alt="AICRA" class="logo">
    <h1>AICRA CMS</h1>
    <p class="sub">잠시 후 편집기가 로드됩니다...</p>
    <p class="info">
      GitHub 로그인이 필요합니다. 권한이 없다면
      <a href="https://github.com/AICRA-PAGE/AICRA-PAGE.github.io/issues/new?template=access-request.md" target="_blank">접근 권한 요청</a>을 해주세요.<br><br>
      <a href="https://aicra-page.github.io">블로그로 돌아가기</a> |
      <a href="/admin/paper-editor.html">Paper Editor</a>
    </p>
  </main>
  <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
</body>
</html>
