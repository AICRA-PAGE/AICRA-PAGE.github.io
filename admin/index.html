<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AICRA Content Management</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', sans-serif; background: #F5F3ED; color: #1C1917; }
    .landing { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; text-align: center; }
    .landing.hidden { display: none; }
    .logo { width: 64px; height: 64px; margin-bottom: 12px; }
    h1 { font-size: 1.2rem; color: #2F5D50; margin-bottom: 4px; }
    .sub { color: #6B665C; font-size: 0.85rem; margin-bottom: 24px; }
    .card { background: #fff; border-radius: 10px; padding: 20px 24px; max-width: 420px; width: 100%; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 16px; }
    .card h3 { font-size: 0.9rem; color: #2F5D50; margin-bottom: 10px; }
    .card ul { text-align: left; list-style: none; padding: 0; }
    .card li { padding: 6px 0; border-bottom: 1px solid #f0ede6; font-size: 0.8rem; color: #44403C; }
    .card li:last-child { border-bottom: none; }
    .card li strong { color: #2F5D50; }
    .btn { display: inline-block; padding: 10px 28px; background: #2F5D50; color: #fff; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: background 0.2s; margin: 4px; text-decoration: none; }
    .btn:hover { background: #245045; }
    .btn.sec { background: #fff; color: #2F5D50; border: 1px solid #2F5D50; }
    .btn.sec:hover { background: #f0ede6; }
    .note { font-size: 0.75rem; color: #8B8580; max-width: 420px; line-height: 1.5; margin-top: 12px; }
    .note a { color: #2F5D50; }
    .token-box { margin-top: 16px; padding: 16px; background: #fff; border-radius: 8px; border: 1px solid #e8e5de; max-width: 420px; width: 100%; display: none; }
    .token-box p { font-size: 0.75rem; color: #6b665c; margin-bottom: 8px; }
    .token-box input { padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; width: 220px; font-size: 0.8rem; }
    .token-box button { padding: 8px 16px; background: #2F5D50; color: #fff; border: none; border-radius: 6px; font-size: 0.8rem; cursor: pointer; margin-left: 4px; }
    .token-box .err { font-size: 0.7rem; color: #c53030; margin-top: 6px; display: none; }
    .token-box .hint { font-size: 0.65rem; color: #999; margin-top: 8px; }
    .token-box .hint a { color: #2F5D50; }
  </style>
</head>
<body>
  <div class="landing" id="landing">
    <img src="/assets/img/logo.svg" alt="AICRA" class="logo">
    <h1>AICRA CMS</h1>
    <p class="sub">AI Security Research Association</p>

    <div class="card">
      <h3>Tools</h3>
      <ul>
        <li><strong>CMS</strong> - Blog/Pages/Media 관리 (Sveltia CMS)</li>
        <li><strong><a href="/admin/paper-editor.html" style="color:#2F5D50;">Paper Editor</a></strong> - 학술 논문 편집기</li>
        <li><strong><a href="/admin/paper-workbench/" style="color:#2F5D50;">Paper Workbench</a></strong> - 7-Phase 논문 라이프사이클</li>
      </ul>
    </div>

    <div>
      <button class="btn" onclick="startCMS()">CMS 시작하기</button>
    </div>

    <p class="note">
      GitHub Collaborator 권한이 필요합니다.
      <a href="https://github.com/AICRA-PAGE/AICRA-PAGE.github.io/issues/new?template=access-request.md" target="_blank">접근 권한 요청</a><br>
      <a href="https://aicra-page.github.io">블로그로 돌아가기</a>
    </p>
  </div>

  <script>
    // Lazy-load CMS only on button click (Sveltia CMS overwrites entire DOM)
    function startCMS() {
      document.getElementById('landing').classList.add('hidden');
      var s = document.createElement('script');
      s.src = 'https://unpkg.com/@sveltia/cms@0.149.0/dist/sveltia-cms.js';
      document.body.appendChild(s);
    }

  </script>
</body>
</html>
