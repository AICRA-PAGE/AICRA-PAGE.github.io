backend:
  name: github
  repo: AICRA-PAGE/AICRA-PAGE.github.io
  branch: main
  base_url: https://auth.aicra.workers.dev

site_url: https://aicra-page.github.io
display_url: https://aicra-page.github.io
logo_url: /assets/img/logo.svg

media_folder: assets/img
public_folder: /assets/img

collections:
  - name: posts
    label: "Blog Posts"
    label_singular: "Post"
    folder: _posts
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} | {{categories}} | {{date}}"
    sortable_fields: [date, title, author]
    view_groups:
      - label: "By Category"
        field: categories
      - label: "By Author"
        field: author
    fields:
      - { label: "Layout", name: layout, widget: hidden, default: post }
      - { label: "Title", name: title, widget: string }
      - { label: "Description", name: description, widget: text, required: false }
      - { label: "Date", name: date, widget: datetime }
      - label: "Author (GitHub ID)"
        name: author
        widget: string
        default: "AICRA"
      - label: "Co-Authors (공동 작성자)"
        name: authors
        widget: list
        required: false
        field: { label: "GitHub ID", name: id, widget: string }
      - label: "Collaborative (누구나 수정 가능)"
        name: collaborative
        widget: boolean
        default: false
        required: false
      - label: "Categories"
        name: categories
        widget: select
        multiple: true
        options: ["Research", "Analysis", "Tutorial", "News", "Events"]
      - label: "Tags"
        name: tags
        widget: list
        allow_add: true
        field: { label: "Tag", name: tag, widget: string }
      - { label: "Featured", name: featured, widget: boolean, default: false, required: false }
      - { label: "Table of Contents", name: toc, widget: boolean, default: true, required: false }
      - { label: "Language", name: lang, widget: select, options: ["ko", "en"], default: "ko" }
      - label: "Thumbnail"
        name: thumbnail
        widget: image
        required: false
        media_folder: "assets/img/posts"
      - { label: "Body", name: body, widget: markdown }

  - name: papers
    label: "Research Papers"
    label_singular: "Paper"
    folder: _papers
    create: true
    slug: "{{slug}}"
    summary: "{{title}} | {{author}} | {{status}}"
    fields:
      - { label: "Layout", name: layout, widget: hidden, default: paper }
      - { label: "Title", name: title, widget: string }
      - { label: "Author (GitHub ID)", name: author, widget: string }
      - label: "Co-Authors"
        name: authors
        widget: list
        required: false
        field: { label: "GitHub ID", name: id, widget: string }
      - { label: "Collaborative", name: collaborative, widget: boolean, default: false, required: false }
      - { label: "Date", name: date, widget: datetime }
      - { label: "Status", name: status, widget: select, options: ["draft", "review", "published"], default: "draft" }
      - { label: "Abstract", name: abstract, widget: text, required: false }
      - label: "Keywords"
        name: keywords
        widget: list
        required: false
        field: { label: "Keyword", name: keyword, widget: string }
      - { label: "Body", name: body, widget: markdown }

  - name: research
    label: "Research Analysis"
    label_singular: "Analysis"
    folder: _research
    create: true
    slug: "{{slug}}"
    summary: "{{title}} | {{venue}} ({{year}})"
    fields:
      - { label: "Layout", name: layout, widget: hidden, default: research }
      - { label: "Title", name: title, widget: string }
      - { label: "Paper URL", name: paper_url, widget: string, required: false }
      - { label: "Venue", name: venue, widget: string, required: false }
      - { label: "Year", name: year, widget: number, value_type: int, required: false }
      - label: "Domain"
        name: domain
        widget: list
        required: false
        field: { label: "Domain", name: domain, widget: string }
      - label: "Scores"
        name: scores
        widget: object
        required: false
        fields:
          - { label: "Novelty (1-10)", name: novelty, widget: number, value_type: int, required: false }
          - { label: "Rigor (1-10)", name: rigor, widget: number, value_type: int, required: false }
          - { label: "Reproducibility (1-10)", name: reproducibility, widget: number, value_type: int, required: false }
          - { label: "Relevance (1-10)", name: relevance, widget: number, value_type: int, required: false }
      - { label: "Author (GitHub ID)", name: author, widget: string }
      - { label: "Date", name: date, widget: datetime }
      - { label: "Last Updated", name: last_updated, widget: string, required: false }
      - { label: "Body", name: body, widget: markdown }

  - name: pages
    label: "Site Pages"
    files:
      - label: "About"
        name: about
        file: _pages/about.md
        fields:
          - { label: "Layout", name: layout, widget: hidden, default: page }
          - { label: "Title", name: title, widget: string }
          - { label: "Permalink", name: permalink, widget: string }
          - { label: "Body", name: body, widget: markdown }
      - label: "Team"
        name: team
        file: _pages/team.md
        fields:
          - { label: "Layout", name: layout, widget: hidden, default: page }
          - { label: "Title", name: title, widget: string }
          - { label: "Permalink", name: permalink, widget: string }
          - { label: "Body", name: body, widget: markdown }
      - label: "News & Activities"
        name: news
        file: _pages/news.md
        fields:
          - { label: "Layout", name: layout, widget: hidden, default: page }
          - { label: "Title", name: title, widget: string }
          - { label: "Permalink", name: permalink, widget: string }
          - { label: "Body", name: body, widget: markdown }
      - label: "Community"
        name: community
        file: _pages/community.md
        fields:
          - { label: "Layout", name: layout, widget: hidden, default: page }
          - { label: "Title", name: title, widget: string }
          - { label: "Permalink", name: permalink, widget: string }
          - { label: "Body", name: body, widget: markdown }
      - label: "Publications"
        name: publications
        file: _pages/publications.md
        fields:
          - { label: "Layout", name: layout, widget: hidden, default: page }
          - { label: "Title", name: title, widget: string }
          - { label: "Permalink", name: permalink, widget: string }
          - { label: "Body", name: body, widget: markdown }
