backend:
  name: github
  repo: AICRA-PAGE/AICRA-PAGE.github.io
  branch: main
  # OAuth proxy required for GitHub Pages (static hosting cannot do server-side token exchange)
  # Deploy sveltia-cms-auth on Cloudflare Workers: https://github.com/sveltia/sveltia-cms-auth
  # Then set base_url to your worker URL (e.g., https://aicra-cms-auth.your-subdomain.workers.dev)
  # base_url: https://YOUR-WORKER.workers.dev

publish_mode: editorial_workflow

media_folder: "assets/images/posts"
public_folder: "/assets/images/posts"

locale: "ko"

collections:
  - name: "posts"
    label: "Blog Posts"
    label_singular: "Post"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sortable_fields: ["date", "title"]
    summary: "{{title}} ({{date}})"
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "post" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Author", name: "author", widget: "string", default: "AICRA" }
      - label: "Categories"
        name: "categories"
        widget: "select"
        multiple: true
        options: ["Research", "Analysis", "Tutorial", "News"]
      - label: "Tags"
        name: "tags"
        widget: "list"
        allow_add: true
        field: { label: "Tag", name: "tag", widget: "string" }
      - { label: "Featured", name: "featured", widget: "boolean", default: false, required: false }
      - { label: "Table of Contents", name: "toc", widget: "boolean", default: true, required: false }
      - { label: "Language", name: "lang", widget: "select", options: ["ko", "en"], default: "ko" }
      - { label: "Thumbnail", name: "thumbnail", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "pages"
    label: "Pages"
    files:
      - label: "About"
        name: "about"
        file: "_pages/about.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "page" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Permalink", name: "permalink", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
      - label: "Team"
        name: "team"
        file: "_pages/team.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "page" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Permalink", name: "permalink", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
      - label: "News"
        name: "news"
        file: "_pages/news.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "page" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Permalink", name: "permalink", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
      - label: "Community"
        name: "community"
        file: "_pages/community.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "page" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Permalink", name: "permalink", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
