<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AICRA Paper Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Pretendard:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<style>
:root{--bg:#f9f8f5;--panel:#fff;--text:#2a2a2a;--muted:#7a756c;--brand:#2f5d50;--brand2:#245045;--line:#e8e5de;--surface:#f3f1ec;--code-bg:#0f172a;--radius:8px;--accent:#b7791f}
[data-theme=dark]{--bg:#1a1d23;--panel:#22262e;--text:#d4d0c8;--muted:#8a8578;--brand:#4da89a;--brand2:#3d8a7e;--line:#333840;--surface:#2a2e36;--code-bg:#0d1117}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* Toolbar */
.tb{display:flex;align-items:center;padding:8px 14px;background:var(--panel);border-bottom:1px solid var(--line);gap:6px;flex-shrink:0}
.tb img{width:22px;height:22px}
.tb h1{font-size:.85rem;color:var(--brand);font-weight:700;margin-right:2px}
.tb .badge{font-size:.58rem;background:var(--accent);color:#fff;padding:1px 6px;border-radius:4px;font-weight:600}
.tb .sep{width:1px;height:20px;background:var(--line);margin:0 3px}
.bt{padding:4px 10px;border:none;border-radius:6px;font-size:.7rem;font-weight:600;cursor:pointer;background:var(--surface);color:var(--text);border:1px solid var(--line);transition:.15s}
.bt:hover{background:var(--line)}
.bt.p{background:var(--brand);color:#fff;border-color:var(--brand)}
.bt.p:hover{background:var(--brand2)}
.spacer{flex:1}
.bt.icon{font-size:.78rem;padding:4px 7px}

/* Meta */
.meta{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;gap:6px;padding:6px 14px;background:var(--surface);border-bottom:1px solid var(--line);flex-shrink:0}
.meta label{font-size:.58rem;color:var(--muted);font-weight:600;display:block;margin-bottom:1px}
.meta input,.meta select{width:100%;padding:4px 7px;border:1px solid var(--line);border-radius:5px;font-size:.75rem;background:var(--panel);color:var(--text);font-family:inherit}
.meta2{display:grid;grid-template-columns:2fr 2fr 1fr;gap:6px;padding:5px 14px;background:var(--surface);border-bottom:1px solid var(--line);flex-shrink:0}
.meta2 label{font-size:.58rem;color:var(--muted);font-weight:600;display:block;margin-bottom:1px}
.meta2 input{width:100%;padding:4px 7px;border:1px solid var(--line);border-radius:5px;font-size:.75rem;background:var(--panel);color:var(--text);font-family:inherit}
.meta2 .chk{display:flex;align-items:center;gap:6px;padding-top:12px}
.meta2 .chk input{width:auto}
.meta2 .chk span{font-size:.7rem;color:var(--muted)}

/* Insert bar - grouped */
.ins{display:flex;gap:3px;padding:4px 14px;background:var(--panel);border-bottom:1px solid var(--line);flex-shrink:0;flex-wrap:wrap;align-items:center}
.ins button{padding:3px 8px;border:1px solid var(--line);border-radius:4px;font-size:.62rem;background:var(--panel);color:var(--muted);cursor:pointer;white-space:nowrap}
.ins button:hover{background:var(--surface);color:var(--text)}
.ins .gl{font-size:.55rem;color:var(--brand);font-weight:700;padding:0 4px 0 6px;border-left:2px solid var(--brand);margin-left:4px}
.ins .gl:first-child{border-left:none;margin-left:0}

/* Editor */
.ed{display:flex;flex:1;overflow:hidden}
.pn{flex:1;display:flex;flex-direction:column;overflow:hidden}
.pn-label{padding:3px 14px;font-size:.6rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;background:var(--surface);border-bottom:1px solid var(--line);flex-shrink:0;display:flex;justify-content:space-between;align-items:center}
.pn-label .opts{display:flex;gap:5px}
.pn-label .opts button{font-size:.56rem;padding:2px 5px;border:1px solid var(--line);border-radius:3px;background:transparent;color:var(--muted);cursor:pointer}
.pn-label .opts button.active{background:var(--brand);color:#fff;border-color:var(--brand)}
#input{flex:1;padding:14px;border:none;resize:none;font-size:13.5px;line-height:1.75;font-family:'JetBrains Mono',monospace;background:var(--panel);color:var(--text);outline:none;tab-size:2}
.dv{width:3px;background:var(--line);cursor:col-resize;flex-shrink:0}

/* Preview - IEEE/ACM engineering paper style */
#pv{flex:1;padding:28px 36px;overflow-y:auto;background:var(--panel);font-family:'Noto Serif KR','Pretendard',serif;font-size:.92rem;line-height:1.85;color:var(--text);max-width:100%}
#pv.two-col{column-count:2;column-gap:24px;column-rule:1px solid var(--line);font-size:.8rem;line-height:1.65;padding:20px 24px}
#pv h1{font-size:1.4rem;font-weight:700;text-align:center;margin-bottom:.2rem;color:var(--text)}
#pv h2{font-size:1.05rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding-bottom:3px;border-bottom:1.5px solid var(--brand);margin:1.6rem 0 .7rem;color:var(--brand)}
#pv h3{font-size:.95rem;font-weight:600;margin:1rem 0 .4rem;color:var(--text)}
#pv h4{font-size:.88rem;font-weight:600;margin:.7rem 0 .3rem;font-style:italic}
#pv p{margin-bottom:.8rem;text-align:justify;hyphens:auto}
#pv ul,#pv ol{margin-bottom:.8rem;padding-left:1.4rem}
#pv li{line-height:1.7;margin-bottom:.2rem}
#pv strong{font-weight:700}
#pv pre{background:var(--code-bg);border-radius:var(--radius);padding:.9rem;margin:.8rem 0;overflow-x:auto;border:1px solid var(--line)}
#pv pre code{font-family:'JetBrains Mono',monospace;font-size:.78rem;color:#e2e8f0;background:none;padding:0}
#pv code{font-family:'JetBrains Mono',monospace;background:var(--surface);padding:1px 4px;border-radius:3px;font-size:.83em;color:var(--brand)}
#pv table{width:100%;border-collapse:collapse;margin:.8rem 0;font-size:.8rem}
#pv th{background:var(--brand);color:#fff;padding:.4rem .5rem;text-align:left;font-weight:600;font-size:.78rem}
#pv td{padding:.4rem .5rem;border-bottom:1px solid var(--line);font-size:.8rem}
#pv tr:nth-child(even){background:var(--surface)}
#pv blockquote{border-left:3px solid var(--brand);padding:.5rem .8rem;margin:.6rem 0;background:var(--surface);font-style:italic;font-size:.85rem}
#pv hr{border:none;border-top:1px solid var(--line);margin:1.2rem 0}
#pv img{max-width:100%;border-radius:var(--radius)}
#pv .katex-display{margin:.6rem 0}
#pv em{font-style:italic}

/* Academic environments */
#pv .env-block{border:1px solid var(--line);border-radius:6px;padding:10px 14px;margin:.8rem 0;background:var(--surface);page-break-inside:avoid}
#pv .env-block.theorem{border-left:4px solid var(--brand)}
#pv .env-block.lemma{border-left:4px solid #6366f1}
#pv .env-block.definition{border-left:4px solid #0891b2}
#pv .env-block.corollary{border-left:4px solid #7c3aed}
#pv .env-block.proposition{border-left:4px solid #059669}
#pv .env-block.algorithm{border-left:4px solid var(--accent);font-family:'JetBrains Mono',monospace;font-size:.78rem;white-space:pre-wrap}
#pv .env-label{font-weight:700;color:var(--brand);margin-bottom:3px;font-size:.84rem}
#pv .env-block.lemma .env-label{color:#6366f1}
#pv .env-block.definition .env-label{color:#0891b2}
#pv .env-block.corollary .env-label{color:#7c3aed}
#pv .env-block.proposition .env-label{color:#059669}
#pv .env-block.algorithm .env-label{color:var(--accent);font-family:'Pretendard',sans-serif}
#pv .proof{margin:.8rem 0;font-style:italic}
#pv .proof::after{content:' \25A1';float:right;color:var(--brand)}
#pv .proof-label{font-weight:700;font-style:normal;margin-right:4px}
#pv .eq-row{display:flex;align-items:center;margin:.4rem 0}
#pv .eq-row .katex-display{flex:1;margin:0}
#pv .eq-num{color:var(--muted);font-size:.78rem;min-width:36px;text-align:right}
#pv .abstract-box{background:var(--surface);border:1px solid var(--line);border-radius:6px;padding:12px 16px;margin:.8rem 0;font-size:.85rem;line-height:1.65}
#pv .abstract-box strong{display:block;margin-bottom:3px;color:var(--brand);font-size:.78rem;text-transform:uppercase;letter-spacing:.5px}
#pv .bib-list{font-size:.78rem;line-height:1.55;counter-reset:bib}
#pv .bib-list p{padding-left:2rem;text-indent:-2rem;margin-bottom:.3rem}
#pv .bib-list p::before{counter-increment:bib;content:'[' counter(bib) '] ';font-weight:600;color:var(--brand)}
#pv .cite{color:var(--brand);font-weight:600;cursor:help}
#pv .fig-caption{text-align:center;font-size:.78rem;color:var(--muted);margin-top:4px;font-style:italic}

/* Status bar */
.st{display:flex;gap:12px;padding:3px 14px;font-size:.62rem;color:var(--muted);background:var(--surface);border-top:1px solid var(--line);flex-shrink:0;align-items:center}
.st b{color:var(--text)}
.score{padding:2px 7px;border-radius:10px;color:#fff;font-size:.6rem}
.sh{background:var(--brand)}.sm{background:var(--accent)}.sl{background:#b42318}

/* Ref sidebar */
.ref-panel{width:0;overflow:hidden;transition:width .2s;border-left:1px solid var(--line);background:var(--panel);display:flex;flex-direction:column}
.ref-panel.open{width:280px}
.ref-head{padding:7px 10px;font-size:.7rem;font-weight:700;color:var(--brand);border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.ref-list{flex:1;overflow-y:auto;padding:6px}
.ref-item{padding:5px 7px;font-size:.68rem;border-bottom:1px solid var(--line);line-height:1.45;color:var(--text)}
.ref-item b{color:var(--brand);margin-right:3px}
.ref-add{display:flex;gap:3px;padding:6px;border-top:1px solid var(--line);flex-shrink:0}
.ref-add input{flex:1;padding:4px 7px;border:1px solid var(--line);border-radius:4px;font-size:.65rem;background:var(--panel);color:var(--text)}
.ref-add button{padding:4px 8px;background:var(--brand);color:#fff;border:none;border-radius:4px;font-size:.62rem;cursor:pointer}

/* Print - IEEE 2-column */
@media print{
  .tb,.meta,.meta2,.ins,.st,.dv,.ref-panel,#input,.pn-label{display:none!important}
  .ed{display:block!important}
  .pn:first-child{display:none!important}
  .pn:last-child{display:block!important;overflow:visible!important}
  #pv{padding:0!important;font-size:10pt!important;column-count:2;column-gap:18pt;line-height:1.4}
  #pv h1{font-size:13pt;margin-bottom:4pt}
  #pv h2{font-size:10pt;text-transform:uppercase}
  #pv table{font-size:8pt}
  body{height:auto;overflow:visible}
}
@media(max-width:1024px){.ed{flex-direction:column}.meta{grid-template-columns:1fr 1fr 1fr}.ref-panel.open{width:220px}}
</style>
</head>
<body>

<div class="tb">
  <img src="/assets/img/logo.svg" alt=""><h1>Paper Editor</h1><span class="badge">AI Security</span>
  <div class="sep"></div>
  <select id="tplSel" style="padding:3px 6px;border:1px solid var(--line);border-radius:5px;font-size:.68rem;background:var(--panel);color:var(--text)" onchange="insTpl(this.value)">
    <option value="">-- Paper Format --</option>
    <option value="ieee">IEEE Conference</option>
    <option value="acm">ACM Conference</option>
    <option value="usenix">USENIX Security</option>
    <option value="journal">Journal (Full)</option>
    <option value="short">Short Paper (4-6p)</option>
    <option value="poster">Poster / Extended Abstract</option>
  </select>
  <button class="bt" onclick="toggleRef()">Refs</button>
  <div class="spacer"></div>
  <button class="bt" onclick="validatePaper()">Validate</button>
  <button class="bt p" onclick="publish()">Export</button>
  <div class="sep"></div>
  <button class="bt icon" onclick="toggleDark()" title="Dark mode">&#9684;</button>
  <button class="bt icon" onclick="toggleFocus()" title="Focus mode">&#9974;</button>
  <button class="bt icon" onclick="window.print()" title="Print/PDF">&#9113;</button>
  <a class="bt" href="/admin/editor.html" style="text-decoration:none;font-size:.62rem">Blog</a>
  <a class="bt" href="/admin/" style="text-decoration:none;font-size:.62rem">CMS</a>
</div>

<div class="meta" id="metaBar">
  <div><label>Title</label><input id="ti" placeholder="Paper title"></div>
  <div><label>Author</label><input id="au" placeholder="First Author" value="AICRA"></div>
  <div><label>Domain</label><select id="dm"><option value="LLM Security">LLM Security</option><option value="Adversarial ML">Adversarial ML</option><option value="Prompt Injection">Prompt Injection</option><option value="AI Red Teaming">AI Red Teaming</option><option value="MCP Security">MCP Security</option><option value="Agentic AI Security">Agentic AI Security</option><option value="Privacy">Privacy / FL</option><option value="AI Governance">AI Governance</option></select></div>
  <div><label>Status</label><select id="st-sel"><option value="draft">Draft</option><option value="review">Review</option><option value="published">Published</option></select></div>
  <div><label>Keywords</label><input id="kw" placeholder="LLM, OWASP, jailbreak"></div>
</div>

<div class="meta2" id="metaBar2">
  <div><label>Co-authors</label><input id="coau" placeholder="Author2, Author3"></div>
  <div><label>Abstract</label><input id="ab" placeholder="One-line abstract"></div>
  <div class="chk"><input type="checkbox" id="collab"><span>Collaborative</span></div>
</div>

<div class="ins" id="insBar">
  <span class="gl">Structure</span>
  <button onclick="ins('sec')">Section</button>
  <button onclick="ins('subsec')">Subsec</button>
  <button onclick="ins('eq')">Equation</button>
  <button onclick="ins('fig')">Figure</button>
  <button onclick="ins('table')">Table</button>
  <button onclick="ins('code')">Code</button>
  <button onclick="ins('cite')">Cite</button>

  <span class="gl">Env</span>
  <button onclick="ins('thm')">Thm</button>
  <button onclick="ins('def')">Def</button>
  <button onclick="ins('lem')">Lem</button>
  <button onclick="ins('proof')">Proof</button>
  <button onclick="ins('algo')">Algo</button>

  <span class="gl">Security</span>
  <button onclick="ins('threat')">Threat Model</button>
  <button onclick="ins('eval_tbl')">Eval Matrix</button>
  <button onclick="ins('comparison')">Comparison</button>
  <button onclick="ins('framework')">Framework Ref</button>
  <button onclick="ins('disclosure')">Disclosure</button>
  <button onclick="ins('ethics')">Ethics</button>
</div>

<div class="ed">
  <div class="pn"><div class="pn-label">LaTeX + Markdown</div>
    <textarea id="input" spellcheck="true" lang="ko" placeholder="Select a template above to start, or write LaTeX + Markdown directly.&#10;&#10;$...$ for inline math, $$...$$ for display math.&#10;:::theorem, :::definition, :::proof for environments.&#10;[cite:1] for citations."></textarea>
  </div>
  <div class="dv" id="dv"></div>
  <div class="pn">
    <div class="pn-label">
      <span>Preview</span>
      <div class="opts">
        <button onclick="toggleCol(false)" class="active" id="col1btn">1-Col</button>
        <button onclick="toggleCol(true)" id="col2btn">2-Col</button>
      </div>
    </div>
    <div id="pv"><p style="color:var(--muted);text-align:center;padding:40px">Select a template or start typing</p></div>
  </div>
  <div class="ref-panel" id="refPanel">
    <div class="ref-head"><span>References</span><button class="bt" style="padding:1px 5px;font-size:.55rem" onclick="toggleRef()">X</button></div>

    </div>
  </div>
</div>

<div class="st" id="stBar">
  <span><b id="wc">0</b>c <b id="ww">0</b>w</span>
  <span>Sec:<b id="sc">0</b></span>
  <span>Eq:<b id="eqc">0</b></span>
  <span>Ref:<b id="rc">0</b></span>
  <span>~<b id="pg">0</b>p</span>
  <span style="margin-left:auto">Score:<span class="score sl" id="qs">0</span></span>
  <span id="as" style="color:var(--brand)"></span>
</div>

<script>
const inp=document.getElementById('input'),pv=document.getElementById('pv');
let focusMode=false,refs=[];
let envCounters={theorem:0,lemma:0,definition:0,corollary:0,proposition:0,algorithm:0};
let eqCounter=0;

// === LIVE PREVIEW ===
inp.addEventListener('input',debounce(()=>{render();},120));
function debounce(fn,ms){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);};}

function render(){
  const raw=inp.value;
  if(!raw.trim()){pv.innerHTML='<p style="color:var(--muted);text-align:center;padding:40px">Select a template or start typing</p>';updateStats(raw);return;}
  envCounters={theorem:0,lemma:0,definition:0,corollary:0,proposition:0,algorithm:0};
  eqCounter=0;
  let t=raw;
  t=processEnvs(t);
  t=processNumberedEq(t);
  t=processCitations(t);
  let html=marked.parse(t);
  html=restoreEnvs(html);
  pv.innerHTML=html;
  renderMathInElement(pv,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false},{left:'\\(',right:'\\)',display:false},{left:'\\[',right:'\\]',display:true}],throwOnError:false});
  updateStats(raw);
}

// === ENVIRONMENTS ===
const envPH=[];
function processEnvs(t){
  envPH.length=0;
  // Abstract
  t=t.replace(/:::abstract\n([\s\S]*?)\n:::/g,(m,body)=>{
    const ph='\x00E'+envPH.length+'\x00';
    envPH.push('<div class="abstract-box"><strong>Abstract</strong>'+marked.parse(body.trim())+'</div>');
    return ph;
  });
  const types=['theorem','lemma','definition','corollary','proposition','algorithm','proof'];
  for(const ty of types){
    const re=new RegExp(':::'+ty+'(?:\\s+(.+?))?\\n([\\s\\S]*?)\\n:::','g');
    t=t.replace(re,(m,title,body)=>{
      let html='';
      if(ty==='proof'){
        html='<div class="proof"><span class="proof-label">Proof.</span> '+(title?'('+title+') ':'')+body.trim()+'</div>';
      }else{
        envCounters[ty]++;
        const N={theorem:'Theorem',lemma:'Lemma',definition:'Definition',corollary:'Corollary',proposition:'Proposition',algorithm:'Algorithm'};
        html='<div class="env-block '+ty+'"><div class="env-label">'+N[ty]+' '+envCounters[ty]+(title?' ('+title+')':'')+'</div>'+body.trim()+'</div>';
      }
      const ph='\x00E'+envPH.length+'\x00';
      envPH.push(html);
      return ph;
    });
  }
  return t;
}
function restoreEnvs(html){for(let i=0;i<envPH.length;i++){html=html.replace('<p>\x00E'+i+'\x00</p>',envPH[i]);html=html.replace('\x00E'+i+'\x00',envPH[i]);}return html;}

function processNumberedEq(t){return t.replace(/^\$\$\s*\n?([\s\S]*?)\n?\$\$\s*$/gm,(m,eq)=>{eqCounter++;return '<div class="eq-row"><div class="katex-display">$$'+eq.trim()+'$$</div><div class="eq-num">('+eqCounter+')</div></div>';});}
function processCitations(t){return t.replace(/\[cite:(\d+)\]/g,(m,n)=>'<span class="cite" title="'+(refs[parseInt(n)-1]||'Ref '+n)+'">['+n+']</span>');}

// === KEYBOARD ===
inp.addEventListener('keydown',e=>{
  if(e.key==='Tab'){e.preventDefault();inp.setRangeText('  ',inp.selectionStart,inp.selectionStart,'end');}
  if((e.ctrlKey||e.metaKey)&&e.key==='b'){e.preventDefault();wrap('**','**');}
  if((e.ctrlKey||e.metaKey)&&e.key==='i'){e.preventDefault();wrap('*','*');}
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();wrap('[','](url)');}
  if((e.ctrlKey||e.metaKey)&&e.key==='m'){e.preventDefault();wrap('$','$');}
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();save();document.getElementById('as').textContent='Saved';}
});
function wrap(a,b){const s=inp.selectionStart,e=inp.selectionEnd,sel=inp.value.substring(s,e);inp.setRangeText(a+sel+b,s,e,'end');inp.dispatchEvent(new Event('input'));}

// === VENUE FORMAT TEMPLATES (format-focused, not topic-prescriptive) ===
function insTpl(type){
  if(!type)return;
  const templates={
ieee:`# [Paper Title]

**Authors:** [Author 1]$^1$, [Author 2]$^2$
$^1$[Department, Institution] $^2$[Department, Institution]

:::abstract
[Context: 1-2 sentences on the problem domain]
[Gap: what is missing or insufficient in current work]
[Method: your approach in one sentence]
[Result: key quantitative finding]
[Implication: why it matters]
:::

**Index Terms:** [term 1], [term 2], [term 3]

---

### 6.4 Results

<!-- Table II: Main Results -->

|--------|----------|----------|----------|
| Baseline 1 | | | |
| Ours | | | |

// === REFERENCE MANAGER ===
function addRef(){const i=document.getElementById('refInput');const v=i.value.trim();if(!v)return;refs.push(v);i.value='';renderRefs();render();}
function removeRef(idx){refs.splice(idx,1);renderRefs();render();}
function renderRefs(){const l=document.getElementById('refList');document.getElementById('rc').textContent=refs.length;l.innerHTML=refs.map((r,i)=>'<div class="ref-item"><b>['+(i+1)+']</b>'+r+' <span style="cursor:pointer;color:#b42318;float:right" onclick="removeRef('+i+')">x</span></div>').join('');}
function toggleRef(){document.getElementById('refPanel').classList.toggle('open');}

// === VALIDATE (AI Security-aware) ===
function validatePaper(){
  const t=inp.value;const issues=[];
  if(!t.match(/^#\s/m))issues.push('[-] Missing title');else issues.push('[+] Title');
  const secs=(t.match(/^##\s/gm)||[]).length;
  issues.push(secs>=5?'[+] '+secs+' sections':'[-] '+secs+' sections (5+ recommended)');
  if(!t.match(/introduction|서론/i))issues.push('[!] No Introduction');
  if(!t.match(/conclusion|결론/i))issues.push('[!] No Conclusion');
  if(!t.match(/reference|참고/i))issues.push('[!] No References');
  // AI Security specific checks
  if(t.match(/threat\s*model|위협\s*모델/i))issues.push('[+] Threat model present');
  else issues.push('[!] No threat model (required for security papers)');
  if(t.match(/MITRE|ATLAS|OWASP|NIST|CWE|CVE/))issues.push('[+] Framework references found');
  else issues.push('[!] No framework mapping (MITRE ATLAS / OWASP / NIST)');
  if(t.match(/ethic|disclosure|책임|윤리/i))issues.push('[+] Ethics/disclosure section');
  else issues.push('[!] No ethics/disclosure section');
  const eqs=Math.floor((t.match(/\$\$/g)||[]).length/2);
  issues.push(eqs>0?'[+] '+eqs+' equations':'[!] No equations');
  const envs=(t.match(/:::(theorem|lemma|definition|algorithm|proof)/g)||[]).length;
  if(envs)issues.push('[+] '+envs+' environments');
  const cites=(t.match(/\[cite:\d+\]/g)||[]).length;
  issues.push(cites>0?'[+] '+cites+' citations':'[!] No citations');
  issues.push(refs.length>0?'[+] '+refs.length+' references':'[-] Reference list empty');
  const wc=t.trim().split(/\s+/).length;
  issues.push(wc>=500?'[+] '+wc+' words':'[!] '+wc+' words (short)');
  if(document.getElementById('ab').value||t.includes(':::abstract'))issues.push('[+] Abstract');
  else issues.push('[-] No abstract');
  // Score
  let sc=0;
  sc+=Math.min(secs*4,20);sc+=(eqs>0?10:0);sc+=(envs>0?10:0);sc+=(cites>0?8:0);sc+=(refs.length>0?8:0);
  sc+=(wc>=1000?12:Math.floor(wc/100)*1.2);
  sc+=(t.match(/threat\s*model|위협/i)?10:0);
  sc+=(t.match(/MITRE|ATLAS|OWASP|NIST/)?8:0);
  sc+=(t.match(/ethic|disclosure/i)?7:0);
  sc+=(t.match(/introduction|서론/i)?4:0);sc+=(t.match(/conclusion|결론/i)?3:0);
  sc=Math.min(Math.round(sc),100);
  const el=document.getElementById('qs');el.textContent=sc;el.className='score '+(sc>=75?'sh':sc>=50?'sm':'sl');
  pv.innerHTML='<div style="background:var(--surface);border-radius:6px;padding:14px;margin-bottom:14px;font-size:.8rem;line-height:1.7"><strong style="color:var(--brand)">Paper Validation ('+sc+'/100)</strong><br>'+issues.join('<br>')+'</div>'+pv.innerHTML;
}

// === STATS ===
function updateStats(t){
  const w=t.trim()?t.trim().split(/\s+/).length:0;
  const s=(t.match(/^##\s/gm)||[]).length;
  const eq=Math.floor((t.match(/\$\$/g)||[]).length/2);
  document.getElementById('wc').textContent=t.length;
  document.getElementById('ww').textContent=w;
  document.getElementById('sc').textContent=s;
  document.getElementById('eqc').textContent=eq;
  document.getElementById('rc').textContent=refs.length;
  document.getElementById('pg').textContent=Math.max(1,Math.ceil(w/300));
  let sc=0;sc+=Math.min(s*4,20);sc+=Math.min(Math.floor(w/80),20);
  sc+=(eq>0?10:0)+(refs.length>0?10:0);
  sc+=(/:::(theorem|definition|lemma|algorithm)/m.test(t)?8:0);
  sc+=(s>=5?8:0)+(/\[cite:\d+\]/m.test(t)?8:0);
  sc+=(/threat|OWASP|MITRE|ATLAS/i.test(t)?8:0);
  sc+=(/ethic|disclosure/i.test(t)?8:0);
  sc=Math.min(sc,100);
  const el=document.getElementById('qs');el.textContent=sc;el.className='score '+(sc>=75?'sh':sc>=50?'sm':'sl');
}

// === EXPORT ===
function publish(){
  const ti=document.getElementById('ti').value||'Untitled';
  const au=document.getElementById('au').value||'AICRA';
  const coau=document.getElementById('coau').value;
  const ab=document.getElementById('ab').value;
  const kw=document.getElementById('kw').value;
  const dm=document.getElementById('dm').value;
  const status=document.getElementById('st-sel').value;
  const collab=document.getElementById('collab').checked;
  const body=inp.value;const today=new Date().toISOString().split('T')[0];
  if(!body.trim())return alert('Content is empty.');
  const authors=coau?'\nauthors: ['+coau.split(',').map(s=>'"'+s.trim()+'"').join(', ')+']':'';
  const kwLine=kw?'\nkeywords: ['+kw.split(',').map(s=>'"'+s.trim()+'"').join(', ')+']':'';
  let refSec='';if(refs.length){refSec='\n\n---\n\n## References\n\n<div class="bib-list">\n'+refs.map(r=>'<p>'+r+'</p>').join('\n')+'\n</div>';}
  const fm='---\nlayout: paper\ntitle: "'+ti+'"\nauthor: '+au+authors+'\ndate: '+today+'\nstatus: '+status+'\ndomain: "'+dm+'"\nabstract: "'+ab+'"'+kwLine+'\ncollaborative: '+collab+'\nlang: ko\n---\n\n'+body+refSec;
  navigator.clipboard.writeText(fm).then(()=>{
    const c=confirm('Copied to clipboard!\n\nOK = Open CMS\nCancel = Download .md');
    if(c)window.open('/admin/#/collections/papers/new','_blank');
    else{const b=new Blob([fm],{type:'text/markdown'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=today+'-'+ti.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'')+'.md';a.click();}
  });
}

// === AUTOSAVE ===
function save(){localStorage.setItem('aicra.paper.v3',JSON.stringify({ti:document.getElementById('ti').value,au:document.getElementById('au').value,coau:document.getElementById('coau').value,ab:document.getElementById('ab').value,kw:document.getElementById('kw').value,dm:document.getElementById('dm').value,status:document.getElementById('st-sel').value,collab:document.getElementById('collab').checked,body:inp.value,refs:refs,at:Date.now()}));}
function restore(){const d=localStorage.getItem('aicra.paper.v3');if(!d)return;const s=JSON.parse(d);if(Date.now()-s.at>604800000)return;inp.value=s.body||'';document.getElementById('ti').value=s.ti||'';document.getElementById('au').value=s.au||'AICRA';document.getElementById('coau').value=s.coau||'';document.getElementById('ab').value=s.ab||'';document.getElementById('kw').value=s.kw||'';if(s.dm)document.getElementById('dm').value=s.dm;if(s.status)document.getElementById('st-sel').value=s.status;if(s.collab)document.getElementById('collab').checked=s.collab;if(s.refs){refs=s.refs;renderRefs();}if(s.body)inp.dispatchEvent(new Event('input'));document.getElementById('as').textContent='Draft restored';}
setInterval(save,30000);restore();
