<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Pretendard, sans-serif">
  <defs><filter id="s"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/></filter></defs>
  <rect width="800" height="400" fill="#F5F3ED" rx="8"/>
  <rect x="0" y="0" width="800" height="42" fill="#2F5D50" rx="8"/>
  <rect x="0" y="32" width="800" height="10" fill="#2F5D50"/>
  <text x="400" y="26" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">AI 보안의 양방향 프레임워크</text>

  <!-- AI4Sec Side -->
  <g filter="url(#s)">
    <rect x="40" y="60" width="340" height="280" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
    <rect x="40" y="60" width="340" height="35" rx="8" fill="#2e7d32"/>
    <rect x="40" y="87" width="340" height="8" fill="#2e7d32"/>
    <text x="210" y="83" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">AI For Security (AI4Sec)</text>
    <text x="210" y="115" text-anchor="middle" fill="#1b5e20" font-size="11">AI 기술로 보안을 강화</text>

    <rect x="60" y="130" width="140" height="35" rx="4" fill="#c8e6c9"/>
    <text x="130" y="152" text-anchor="middle" fill="#2e7d32" font-size="10" font-weight="600">탐지 (Detection)</text>

    <rect x="220" y="130" width="140" height="35" rx="4" fill="#c8e6c9"/>
    <text x="290" y="152" text-anchor="middle" fill="#2e7d32" font-size="10" font-weight="600">분석 (Analysis)</text>

    <rect x="60" y="180" width="140" height="35" rx="4" fill="#c8e6c9"/>
    <text x="130" y="202" text-anchor="middle" fill="#2e7d32" font-size="10" font-weight="600">자동화 (Automation)</text>

    <rect x="220" y="180" width="140" height="35" rx="4" fill="#c8e6c9"/>
    <text x="290" y="202" text-anchor="middle" fill="#2e7d32" font-size="10" font-weight="600">예측 (Prediction)</text>

    <text x="60" y="240" fill="#4caf50" font-size="9">- 이상 탐지, UEBA</text>
    <text x="60" y="255" fill="#4caf50" font-size="9">- 악성코드 분류</text>
    <text x="60" y="270" fill="#4caf50" font-size="9">- 인시던트 자동 대응</text>
    <text x="60" y="285" fill="#4caf50" font-size="9">- 위협 인텔리전스 분석</text>
    <text x="60" y="300" fill="#4caf50" font-size="9">- 취약점 우선순위 예측</text>
    <text x="60" y="315" fill="#4caf50" font-size="9">- SOAR 플레이북 자동화</text>
  </g>

  <!-- Sec4AI Side -->
  <g filter="url(#s)">
    <rect x="420" y="60" width="340" height="280" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="2"/>
    <rect x="420" y="60" width="340" height="35" rx="8" fill="#B5422C"/>
    <rect x="420" y="87" width="340" height="8" fill="#B5422C"/>
    <text x="590" y="83" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Security For AI (Sec4AI)</text>
    <text x="590" y="115" text-anchor="middle" fill="#b71c1c" font-size="11">AI 시스템 자체를 보호</text>

    <rect x="440" y="130" width="140" height="35" rx="4" fill="#ffcdd2"/>
    <text x="510" y="152" text-anchor="middle" fill="#c62828" font-size="10" font-weight="600">모델 보호</text>

    <rect x="600" y="130" width="140" height="35" rx="4" fill="#ffcdd2"/>
    <text x="670" y="152" text-anchor="middle" fill="#c62828" font-size="10" font-weight="600">데이터 보호</text>

    <rect x="440" y="180" width="140" height="35" rx="4" fill="#ffcdd2"/>
    <text x="510" y="202" text-anchor="middle" fill="#c62828" font-size="10" font-weight="600">입력/추론 보호</text>

    <rect x="600" y="180" width="140" height="35" rx="4" fill="#ffcdd2"/>
    <text x="670" y="202" text-anchor="middle" fill="#c62828" font-size="10" font-weight="600">에이전트/MCP</text>

    <text x="440" y="240" fill="#e57373" font-size="9">- 모델 탈취 방지</text>
    <text x="440" y="255" fill="#e57373" font-size="9">- 적대적 공격 방어</text>
    <text x="440" y="270" fill="#e57373" font-size="9">- 프롬프트 인젝션 차단</text>
    <text x="440" y="285" fill="#e57373" font-size="9">- 데이터 포이즈닝 탐지</text>
    <text x="440" y="300" fill="#e57373" font-size="9">- 에이전트 권한 제어</text>
    <text x="440" y="315" fill="#e57373" font-size="9">- MCP 통신 보안</text>
  </g>

  <!-- Bidirectional arrows -->
  <line x1="383" y1="180" x2="417" y2="180" stroke="#5C5A54" stroke-width="3" marker-end="url(#arr)"/>
  <line x1="417" y1="200" x2="383" y2="200" stroke="#5C5A54" stroke-width="3" marker-end="url(#arr)"/>
  <text x="400" y="225" text-anchor="middle" fill="#5C5A54" font-size="10" font-weight="700" transform="rotate(-90, 400, 225)">상호 강화</text>

  <text x="400" y="375" text-anchor="middle" fill="#9e9e9e" font-size="10">AICRA | AI 보안 양방향 프레임워크 - NIST AI RMF, Google SAIF, MITRE ATLAS 참조</text>
</svg>
