<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" fill="#1C1917"/>
  <rect x="40" y="40" width="720" height="320" rx="8" fill="#292524" stroke="#44403C"/>
  <!-- Two-way framework -->
  <g transform="translate(100,90)">
    <rect width="250" height="70" rx="6" fill="#2F5D50"/>
    <text x="125" y="30" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="15" font-weight="700">AI For Security</text>
    <text x="125" y="50" text-anchor="middle" fill="#89B5A9" font-family="sans-serif" font-size="11">Detection + Automation</text>
  </g>
  <g transform="translate(450,90)">
    <rect width="250" height="70" rx="6" fill="#B5422C"/>
    <text x="125" y="30" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="15" font-weight="700">Security For AI</text>
    <text x="125" y="50" text-anchor="middle" fill="#E8A08C" font-family="sans-serif" font-size="11">Protection + Governance</text>
  </g>
  <!-- Bidirectional arrows -->
  <line x1="360" y1="115" x2="440" y2="115" stroke="#E9E4DA" stroke-width="3"/>
  <polygon points="440,109 455,115 440,121" fill="#E9E4DA"/>
  <line x1="440" y1="135" x2="360" y2="135" stroke="#E9E4DA" stroke-width="3"/>
  <polygon points="360,129 345,135 360,141" fill="#E9E4DA"/>
  <text x="400" y="220" text-anchor="middle" fill="#BEB7AA" font-family="sans-serif" font-size="13">Bidirectional Framework</text>
  <text x="400" y="280" text-anchor="middle" fill="#E9E4DA" font-family="sans-serif" font-size="22" font-weight="700">AI Security Framework</text>
  <text x="400" y="310" text-anchor="middle" fill="#BEB7AA" font-family="sans-serif" font-size="14">NIST AI RMF + SAIF + ATLAS Mapping</text>
</svg>
