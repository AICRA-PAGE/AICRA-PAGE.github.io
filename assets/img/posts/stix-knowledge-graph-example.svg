<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Pretendard, -apple-system, sans-serif">
  <defs>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#B5422C" flood-opacity="0.3"/>
    </filter>
    <filter id="shadow2">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#78909c"/>
    </marker>
  </defs>

  <rect width="800" height="500" fill="#F5F3ED" rx="8"/>

  <!-- Title -->
  <rect x="0" y="0" width="800" height="45" fill="#2F5D50" rx="8"/>
  <rect x="0" y="35" width="800" height="10" fill="#2F5D50"/>
  <text x="400" y="28" text-anchor="middle" fill="white" font-size="16" font-weight="700">지식 그래프 기반 APT 공격 상관분석 예시</text>

  <!-- APT28 Node (center) -->
  <g filter="url(#glow)">
    <circle cx="400" cy="200" r="45" fill="#B5422C" stroke="#8B3020" stroke-width="2"/>
    <text x="400" y="195" text-anchor="middle" fill="white" font-size="13" font-weight="700">APT28</text>
    <text x="400" y="212" text-anchor="middle" fill="#ffcdd2" font-size="9">Threat Actor</text>
  </g>

  <!-- Technique Nodes -->
  <g filter="url(#shadow2)">
    <rect x="100" y="90" width="130" height="45" rx="20" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
    <text x="165" y="110" text-anchor="middle" fill="#0d47a1" font-size="11" font-weight="600">T1566.001</text>
    <text x="165" y="125" text-anchor="middle" fill="#42a5f5" font-size="9">Spear Phishing</text>
  </g>

  <g filter="url(#shadow2)">
    <rect x="100" y="260" width="130" height="45" rx="20" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
    <text x="165" y="280" text-anchor="middle" fill="#0d47a1" font-size="11" font-weight="600">T1059.001</text>
    <text x="165" y="295" text-anchor="middle" fill="#42a5f5" font-size="9">PowerShell</text>
  </g>

  <g filter="url(#shadow2)">
    <rect x="570" y="90" width="130" height="45" rx="20" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
    <text x="635" y="110" text-anchor="middle" fill="#0d47a1" font-size="11" font-weight="600">T1021.001</text>
    <text x="635" y="125" text-anchor="middle" fill="#42a5f5" font-size="9">Remote Desktop</text>
  </g>

  <g filter="url(#shadow2)">
    <rect x="570" y="260" width="130" height="45" rx="20" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
    <text x="635" y="280" text-anchor="middle" fill="#0d47a1" font-size="11" font-weight="600">T1071.001</text>
    <text x="635" y="295" text-anchor="middle" fill="#42a5f5" font-size="9">Web Protocol C2</text>
  </g>

  <!-- Malware Node -->
  <g filter="url(#shadow2)">
    <rect x="310" y="350" width="120" height="40" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1.5"/>
    <text x="370" y="367" text-anchor="middle" fill="#b71c1c" font-size="11" font-weight="600">Sofacy</text>
    <text x="370" y="382" text-anchor="middle" fill="#e57373" font-size="9">Malware</text>
  </g>

  <!-- Target Node -->
  <g filter="url(#shadow2)">
    <rect x="500" y="370" width="130" height="40" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
    <text x="565" y="387" text-anchor="middle" fill="#1b5e20" font-size="11" font-weight="600">금융기관 A</text>
    <text x="565" y="402" text-anchor="middle" fill="#66bb6a" font-size="9">Target Identity</text>
  </g>

  <!-- IOC Nodes -->
  <g filter="url(#shadow2)">
    <rect x="120" y="370" width="140" height="40" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
    <text x="190" y="387" text-anchor="middle" fill="#bf360c" font-size="11" font-weight="600">185.xx.xx.42</text>
    <text x="190" y="402" text-anchor="middle" fill="#ff9800" font-size="9">C2 IP Indicator</text>
  </g>

  <!-- Edges: APT28 -> Techniques (uses) -->
  <line x1="360" y1="180" x2="230" y2="125" stroke="#78909c" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="280" y="145" fill="#B5422C" font-size="9" font-weight="600">uses</text>

  <line x1="360" y1="220" x2="230" y2="270" stroke="#78909c" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="280" y="255" fill="#B5422C" font-size="9" font-weight="600">uses</text>

  <line x1="440" y1="180" x2="570" y2="125" stroke="#78909c" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="520" y="145" fill="#B5422C" font-size="9" font-weight="600">uses</text>

  <line x1="440" y1="220" x2="570" y2="270" stroke="#78909c" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="520" y="255" fill="#B5422C" font-size="9" font-weight="600">uses</text>

  <!-- APT28 -> Malware (deploys) -->
  <line x1="390" y1="245" x2="375" y2="350" stroke="#c62828" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="365" y="310" fill="#c62828" font-size="9" font-weight="600">deploys</text>

  <!-- APT28 -> Target (targets) -->
  <line x1="430" y1="235" x2="545" y2="370" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="510" y="320" fill="#2e7d32" font-size="9" font-weight="600">targets</text>

  <!-- Technique -> IOC (indicates) -->
  <line x1="165" y1="305" x2="185" y2="370" stroke="#e65100" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="145" y="345" fill="#e65100" font-size="9" font-weight="600">indicates</text>

  <!-- Technique chain (sequence) -->
  <path d="M 230 112 Q 400 60 570 112" stroke="#7b1fa2" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="400" y="70" text-anchor="middle" fill="#7b1fa2" font-size="9" font-weight="600">attack sequence</text>

  <!-- Legend -->
  <rect x="30" y="440" width="740" height="45" rx="6" fill="white" stroke="#e0e0e0"/>
  <circle cx="70" cy="462" r="8" fill="#B5422C"/>
  <text x="85" y="466" fill="#333" font-size="10">Threat Actor</text>
  <rect x="170" y="454" width="16" height="16" rx="8" fill="#e3f2fd" stroke="#1565c0"/>
  <text x="192" y="466" fill="#333" font-size="10">Technique</text>
  <rect x="270" y="454" width="16" height="16" rx="3" fill="#fce4ec" stroke="#c62828"/>
  <text x="292" y="466" fill="#333" font-size="10">Malware</text>
  <rect x="360" y="454" width="16" height="16" rx="3" fill="#e8f5e9" stroke="#2e7d32"/>
  <text x="382" y="466" fill="#333" font-size="10">Target</text>
  <rect x="440" y="454" width="16" height="16" rx="3" fill="#fff3e0" stroke="#e65100"/>
  <text x="462" y="466" fill="#333" font-size="10">IOC</text>
  <line x1="530" y1="462" x2="555" y2="462" stroke="#78909c" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="562" y="466" fill="#333" font-size="10">관계(uses, targets)</text>
  <line x1="680" y1="462" x2="705" y2="462" stroke="#7b1fa2" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="712" y="466" fill="#333" font-size="10">공격 체인</text>
</svg>
