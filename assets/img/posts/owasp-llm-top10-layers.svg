<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="Pretendard, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="800" height="450" fill="#F5F3ED" rx="8"/>
  <rect x="0" y="0" width="800" height="45" fill="#B5422C" rx="8"/>
  <rect x="0" y="35" width="800" height="10" fill="#B5422C"/>
  <text x="400" y="28" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">OWASP LLM Top 10 2025 - 위협 계층 분석</text>

  <!-- Supply Chain Layer (L0) -->
  <g filter="url(#s)">
    <rect x="50" y="60" width="700" height="55" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
    <text x="80" y="82" fill="#bf360c" font-size="12" font-weight="700">Layer 0: 공급망</text>
    <rect x="300" y="72" width="180" height="30" rx="4" fill="#e65100" opacity="0.9"/>
    <text x="390" y="92" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">LLM03 Supply Chain</text>
  </g>

  <!-- Input Layer (L1) -->
  <g filter="url(#s)">
    <rect x="50" y="130" width="700" height="70" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1.5"/>
    <text x="80" y="155" fill="#b71c1c" font-size="12" font-weight="700">Layer 1: 입력 계층</text>
    <rect x="200" y="148" width="160" height="30" rx="4" fill="#c62828"/>
    <text x="280" y="168" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">LLM01 Prompt Injection</text>
    <rect x="380" y="148" width="170" height="30" rx="4" fill="#c62828"/>
    <text x="465" y="168" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">LLM04 Data Poisoning</text>
  </g>

  <!-- Processing Layer (L2) -->
  <g filter="url(#s)">
    <rect x="50" y="215" width="700" height="70" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
    <text x="80" y="240" fill="#0d47a1" font-size="12" font-weight="700">Layer 2: 처리 계층</text>
    <rect x="200" y="233" width="130" height="30" rx="4" fill="#1565c0"/>
    <text x="265" y="253" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">LLM07 Prompt Leak</text>
    <rect x="345" y="233" width="140" height="30" rx="4" fill="#1565c0"/>
    <text x="415" y="253" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">LLM08 Vector/Embed</text>
    <rect x="500" y="233" width="130" height="30" rx="4" fill="#1565c0"/>
    <text x="565" y="253" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">LLM09 Misinfo</text>
  </g>

  <!-- Output Layer (L3) -->
  <g filter="url(#s)">
    <rect x="50" y="300" width="700" height="70" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
    <text x="80" y="325" fill="#1b5e20" font-size="12" font-weight="700">Layer 3: 출력/운영 계층</text>
    <rect x="200" y="318" width="120" height="30" rx="4" fill="#2e7d32"/>
    <text x="260" y="338" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">LLM02 Info Disc.</text>
    <rect x="335" y="318" width="130" height="30" rx="4" fill="#2e7d32"/>
    <text x="400" y="338" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">LLM05 Output Hdl</text>
    <rect x="480" y="318" width="130" height="30" rx="4" fill="#2e7d32"/>
    <text x="545" y="338" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">LLM06 Agency</text>
    <rect x="625" y="318" width="100" height="30" rx="4" fill="#2e7d32"/>
    <text x="675" y="338" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">LLM10 Cost</text>
  </g>

  <!-- Legend -->
  <text x="400" y="405" text-anchor="middle" fill="#9e9e9e" font-size="10">AICRA | OWASP LLM Top 10 2025 위협 계층 분석 (저자 분석, OWASP 공식 분류 아님)</text>
  <text x="400" y="425" text-anchor="middle" fill="#bdbdbd" font-size="9">Critical(빨강) > High(파랑/초록) > Medium(파랑) | Layer 0(공급망) -> Layer 1(입력) -> Layer 2(처리) -> Layer 3(출력)</text>
</svg>
