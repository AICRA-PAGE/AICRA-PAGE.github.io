<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" fill="#1C1917"/>
  <rect x="40" y="40" width="720" height="320" rx="8" fill="#292524" stroke="#44403C"/>
  <!-- Physical system -->
  <g transform="translate(100,90)">
    <rect width="200" height="80" rx="6" fill="#2F5D50"/>
    <text x="100" y="35" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="14" font-weight="600">Physical System</text>
    <text x="100" y="55" text-anchor="middle" fill="#89B5A9" font-family="sans-serif" font-size="11">Sensors + Actuators</text>
  </g>
  <!-- Digital Twin -->
  <g transform="translate(500,90)">
    <rect width="200" height="80" rx="6" fill="#B5422C"/>
    <text x="100" y="35" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="14" font-weight="600">Digital Twin</text>
    <text x="100" y="55" text-anchor="middle" fill="#E8A08C" font-family="sans-serif" font-size="11">Virtual Model</text>
  </g>
  <!-- Sync arrows -->
  <line x1="310" y1="115" x2="490" y2="115" stroke="#6B665C" stroke-width="2"/>
  <polygon points="490,110 502,115 490,120" fill="#6B665C"/>
  <line x1="490" y1="145" x2="310" y2="145" stroke="#6B665C" stroke-width="2"/>
  <polygon points="310,140 298,145 310,150" fill="#6B665C"/>
  <text x="400" y="108" text-anchor="middle" fill="#BEB7AA" font-family="sans-serif" font-size="10">Data Sync</text>
  <text x="400" y="160" text-anchor="middle" fill="#BEB7AA" font-family="sans-serif" font-size="10">Control Feedback</text>
  <!-- Attack -->
  <text x="400" y="210" text-anchor="middle" fill="#B5422C" font-family="monospace" font-size="12">Synchronization Attack</text>
  <text x="400" y="280" text-anchor="middle" fill="#E9E4DA" font-family="sans-serif" font-size="22" font-weight="700">Digital Twin Security</text>
  <text x="400" y="310" text-anchor="middle" fill="#BEB7AA" font-family="sans-serif" font-size="14">ICS/SCADA Threats &amp; Risk Assessment</text>
</svg>
