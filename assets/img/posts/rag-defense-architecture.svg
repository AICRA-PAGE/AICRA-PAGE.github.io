<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" font-family="Pretendard, sans-serif">
  <defs><filter id="s"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/></filter></defs>
  <rect width="800" height="350" fill="#F5F3ED" rx="8"/>
  <rect x="0" y="0" width="800" height="40" fill="#2F5D50" rx="8"/>
  <rect x="0" y="30" width="800" height="10" fill="#2F5D50"/>
  <text x="400" y="25" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">RAG 시스템 Defense-in-Depth 아키텍처</text>

  <!-- 7 Layers -->
  <g filter="url(#s)">
    <rect x="50" y="55" width="700" height="35" rx="4" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1"/>
    <text x="400" y="77" text-anchor="middle" fill="#1b5e20" font-size="10" font-weight="600">L1: 인프라 보안 | VPC 격리, TLS 1.3, HSM 키 관리</text>
  </g>
  <g filter="url(#s)">
    <rect x="50" y="95" width="700" height="35" rx="4" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1"/>
    <text x="400" y="117" text-anchor="middle" fill="#1b5e20" font-size="10" font-weight="600">L2: 인증/권한 | RBAC, mTLS, 최소 권한 원칙</text>
  </g>
  <g filter="url(#s)">
    <rect x="50" y="135" width="700" height="35" rx="4" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
    <text x="400" y="157" text-anchor="middle" fill="#bf360c" font-size="10" font-weight="600">L3: 데이터 분류/암호화 | AES-256, 필드 레벨 암호화, PII 마스킹</text>
  </g>
  <g filter="url(#s)">
    <rect x="50" y="175" width="700" height="35" rx="4" fill="#fce4ec" stroke="#c62828" stroke-width="1"/>
    <text x="400" y="197" text-anchor="middle" fill="#b71c1c" font-size="10" font-weight="600">L4: 입력 검증 | JSON Schema, 정규식, 크기 제한, 화이트리스트</text>
  </g>
  <g filter="url(#s)">
    <rect x="50" y="215" width="700" height="35" rx="4" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
    <text x="400" y="237" text-anchor="middle" fill="#0d47a1" font-size="10" font-weight="600">L5: 임베딩 무결성 | 해시 검증, 이상 탐지, L2 정규화</text>
  </g>
  <g filter="url(#s)">
    <rect x="50" y="255" width="700" height="35" rx="4" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1"/>
    <text x="400" y="277" text-anchor="middle" fill="#4a148c" font-size="10" font-weight="600">L6: 컨텍스트/프롬프트 보안 | 마크업 분리, 동적 프롬프트, 인젝션 탐지</text>
  </g>
  <g filter="url(#s)">
    <rect x="50" y="295" width="700" height="35" rx="4" fill="#fff8e1" stroke="#f9a825" stroke-width="1"/>
    <text x="400" y="317" text-anchor="middle" fill="#f57f17" font-size="10" font-weight="600">L7: 출력 검증/모니터링 | PII 필터, 이상 응답 탐지, 감사 로깅</text>
  </g>

  <text x="400" y="345" text-anchor="middle" fill="#9e9e9e" font-size="9">AICRA | RAG 시스템 7계층 보안 아키텍처</text>
</svg>
